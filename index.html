<!DOCTYPE html>
<html lang="es">
<head>
  <title>Dra. Susana Vighi | Mapa de Buenos Aires</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./logo_vighi.png" type="image/png">
  <link rel="stylesheet" href="./mapa.css">
</head>
<body>

  <!-- Menú de inicio -->
  <div id="menuInicio" class="menu-inicio">
    <div class="menu-inicio-card">
      <img src="logo_vighi.png" alt="Dra. Susana Vighi" class="menu-logo">
      <h1>Mapa de Prestadores</h1>
      <p>Seleccioná el tipo de prestador que querés ver:</p>
        <div class="menu-opciones">
          <button class="menu-opcion" onclick="seleccionarCategoria('sanatorios', 'argentina')">
            <span class="menu-opcion-icon">🇦🇷</span>
            <span class="menu-opcion-titulo">Argentina</span>
          </button>
          <button class="menu-opcion" onclick="seleccionarCategoria('sanatorios', 'expansion')">
            <span class="menu-opcion-icon">🚀</span>
            <span class="menu-opcion-titulo">Proyecto de<br>Expansión</span>
          </button>
        </div>
        <br>
        <div class="menu-opciones">
          <button class="menu-opcion" onclick="seleccionarCategoria('sanatorios')">
            <span class="menu-opcion-icon">🏥</span>
            <span class="menu-opcion-titulo">Sanatorios y<br>Centros Médicos</span>
          </button>
          <button class="menu-opcion" onclick="seleccionarCategoria('consultorios')">
            <span class="menu-opcion-icon">🩺</span>
            <span class="menu-opcion-titulo">Consultorios<br>Externos</span>
          </button>
        </div>
    </div>
  </div>

  <div class="app-container">

    <!-- Header solo en mobile -->
    <header class="mobile-header">
      <span class="mobile-header-title">Dra. Susana Vighi | Mapa de Buenos Aires</span>
    </header>

    <!-- Panel lateral / bottom sheet en mobile -->
    <div class="side-panel" id="sidePanel">
      <!-- Handle para arrastrar en mobile -->
      <div class="panel-handle" id="panelHandle">
        <div class="drag-bar"></div>
      </div>
      <div class="panel-header">
        <h2>Mapa de Buenos Aires</h2>
        <div class="categoria-bar">
          <span class="categoria-badge" id="categoriaActualLabel"></span>
          <button class="btn-cambiar-categoria" onclick="volverAlMenu()">Cambiar</button>
        </div>
        <p id="panelDesc">Hacé click en una comuna para ver los prestadores que trabajan con Vighi.</p>
        <div class="search-wrapper">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Buscar sanatorio o dirección..."
            autocomplete="off"
          >
          <button class="search-clear" id="searchClear" title="Limpiar">✕</button>
        </div>
      </div>
      <div class="panel-body" id="panelBody">
        <div class="placeholder">
          <div class="placeholder-icon">🗺️</div>
          <p>Seleccioná una comuna<br>o partido en el mapa</p>
        </div>
      </div>
    </div>

    <!-- Mapa -->
    <div class="map-wrapper">
      <div id="map"></div>

      <!-- Leyenda de prioridad -->
      <div class="legend" id="leyendaPrioridad" style="display:none;">
        <h4>Prioridad</h4>
        <div class="legend-item">
          <div class="legend-pin" style="border-color:#27ae60;"></div>
          <span>Alta</span>
        </div>
        <div class="legend-item">
          <div class="legend-pin" style="border-color:#f39c12;"></div>
          <span>Media</span>
        </div>
        <div class="legend-item">
          <div class="legend-pin" style="border-color:#e74c3c;"></div>
          <span>Baja</span>
        </div>
      </div>
    </div>

  </div>

  <script src="./mapa.js"></script>

  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASQBz2j2svQxE2qpAIt-H1-eHQqFIfRaM&callback=initMap">
  </script>
</body>
</html>
